  /api/ext/route:
    get:
      tags:
      - Sea Routes
      summary: Calculate sea route between two points
      description: 'Calculates the optimal navigable sea route between two waypoints. Either endpoint can be specified as
        a UN/LOCODE port or lat/lon coordinates.


        **Credit cost:** 1 credit per query.

        '
      operationId: getSeaRoute
      parameters:
      - $ref: '#/components/parameters/ApiKey'
      - name: port_unlocode_from
        in: query
        description: Origin port UN/LOCODE (alternative to lat_from/lon_from).
        schema:
          type: string
        example: FIHEL
      - name: lat_from
        in: query
        description: Origin latitude.
        schema:
          type: number
          format: float
      - name: lon_from
        in: query
        description: Origin longitude.
        schema:
          type: number
          format: float
      - name: port_unlocode_to
        in: query
        description: Destination port UN/LOCODE (alternative to lat_to/lon_to).
        schema:
          type: string
      - name: lat_to
        in: query
        description: Destination latitude.
        schema:
          type: number
          format: float
        example: 59.437
      - name: lon_to
        in: query
        description: Destination longitude.
        schema:
          type: number
          format: float
        example: 24.7536
      responses:
        '200':
          description: Calculated route with waypoints and total distance.
          content:
            application/json:
              schema:
                type: object
                properties:
