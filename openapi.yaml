        properties:
          estimated_position:
            type: object
            description: AI-estimated current position. Populated when the vessel is out of terrestrial AIS range (inactive
              for 3+ hours). Based on last known position, destination port, and ETA.
            properties:
              lat:
                type: number
                format: float
                description: Estimated latitude.
                example: 1.5818719819246652
              lon:
                type: number
                format: float
                description: Estimated longitude.
                example: -31.117992949793297
security:
- ApiKeyQuery: []
tags:
- name: Live Tracking
  description: Real-time AIS vessel positions.
- name: Historical Vessel Data
  description: Past AIS positions for a specific vessel.
- name: Location Traffic
  description: All vessels currently within a geographic area.
- name: Ship Static Data
  description: Static vessel specifications and registry search.
- name: Ports
  description: Port finder and terminal lookup.
- name: Reports
  description: 'Asynchronous bulk data exports. POST to submit a job, GET to poll,

    download the CSV via result_url once status is DONE.

    '
- name: Usage
  description: API credit and request monitoring.
- name: Add-ons - Dry Dock
  description: Planned and completed dry dock periods.
- name: Add-ons - Companies
  description: Maritime company profiles (type, status, contacts, parent company).
- name: Add-ons - Casualties
  description: Incident records with type, date, and narrative.
- name: Add-ons - Inspections
  description: Port State Control inspection and detention records.
- name: Add-ons - Sales & Demolitions
  description: Ship sales, purchase, and demolition records.
- name: Add-ons - Ownership
  description: Beneficial owner, operator, and manager data.
- name: Add-ons - Classification
  description: Class society, survey dates, and structural dimensions.
- name: Add-ons - Engines
  description: Engine designation, builder, designer, and output data.
- name: Sea Routes
  description: Calculate navigable sea routes between ports or coordinates.
paths:
  /api/v0/vessel:
    get:
      tags:
      - Live Tracking
      summary: Real-time vessel position (basic)
      description: 'Returns the latest AIS position and key attributes for a single vessel.

        Identify the vessel by one of: `uuid`, `mmsi`, or `imo`.


        **Credit cost:** 1 per vessel found.

        **Typical response time:** ~5 ms.

        '
      operationId: getVessel
      parameters:
      - $ref: '#/components/parameters/ApiKey'
      - name: uuid
        in: query
        schema:
          type: string
          format: uuid
