                    type: object
                    properties:
                      distance_nm:
                        type: number
                        format: float
                        description: Total route distance in nautical miles.
                      waypoints:
                        type: array
                        items:
                          type: object
                          properties:
                            lat:
                              type: number
                              format: float
                            lon:
                              type: number
                              format: float
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          description: Invalid or missing API key.
  /api/v0/report:
    post:
      tags:
      - Reports
      summary: Submit async report job
      description: 'Initiates a bulk data export job. Returns `report_id` immediately.

        Poll GET `/api/v0/report` until `status: DONE`, then download the CSV

        from `result_url`.


        ### Report types


        | report_type | Description | Credit cost |

        |---|---|---|

        | `vessel_list` | Full vessel registry snapshot | 5 000 |

        | `port_list` | Full port list snapshot | 500 |

        | `request_usage` | Your API key usage log | Free |

        | `inradius_history` | Historical AIS for a zone (max 7-day window, max 50 NM radius) | days x vessels found, capped
        at 500/day |

        | `dry_dock_dates` | Dry dock bulk export | Add-on pricing |

        | `companies` | Maritime companies bulk export | Add-on pricing |

        | `casualty` | Casualties bulk export | Add-on pricing |

        | `inspections` | Inspections bulk export | Add-on pricing |

        | `sales_purchase_demolitions` | Sales & demolitions bulk export | Add-on pricing |

        | `ownership` | Ownership bulk export | Add-on pricing |

        | `class_society` | Classification society bulk export | Add-on pricing |

        | `engine` | Engine data bulk export | Add-on pricing |


        Submitting any job costs 1 credit. `request_usage` is free.

        '
      operationId: submitReport
      parameters:
      - $ref: '#/components/parameters/ApiKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - report_type
              properties:
                report_type:
                  type: string
                  enum:
                  - vessel_list
                  - port_list
                  - request_usage
                  - inradius_history
                  - dry_dock_dates
                  - companies
                  - casualty
                  - inspections
                  - sales_purchase_demolitions
                  - ownership
                  - class_society
                  - engine
                lat:
                  type: number
                  format: float
                  description: Required for inradius_history. Centre latitude.
                  example: 51.8951
                lon:
                  type: number
                  format: float
                  description: Required for inradius_history. Centre longitude.
                  example: 4.3973
                radius:
                  type: integer
                  description: Required for inradius_history. Radius in nautical miles (max 50).
                  example: 10
                from:
                  type: string
                  format: date
                  description: Start date yyyy-mm-dd. inradius_history max 7-day window; request_usage max 31 days.
                  example: '2022-07-01'
                to:
                  type: string
                  format: date
                  description: End date yyyy-mm-dd.
                  example: '2022-07-05'
                updated_from:
                  type: string
                  format: date
                  description: For add-on bulk reports. Only include records updated on or after this date.
                  example: '2023-01-01'
            examples:
              vessel_list:
                summary: Full vessel registry
                value:
                  report_type: vessel_list
              inradius_history:
                summary: Historical traffic near Rotterdam, 1-5 July 2022
                value:
                  report_type: inradius_history
                  lat: 51.8951
                  lon: 4.3973
                  radius: 10
                  from: '2022-07-01'
                  to: '2022-07-05'
              request_usage:
                summary: My API usage for December 2022
                value:
                  report_type: request_usage
                  from: '2022-12-01'
                  to: '2022-12-31'
              ownership_bulk:
                summary: All ownership records updated in 2023 or later
                value:
                  report_type: ownership
                  updated_from: '2023-01-01'
      responses:
        '202':
          description: Job accepted. Poll with the returned report_id.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ReportJob'
                  meta:
                    $ref: '#/components/schemas/Meta'
              example:
                data:
                  report_id: rpt_7f3a9c12
                  status: PENDING
                  report_type: inradius_history
                  created_at: '2026-01-15T09:00:00Z'
                  result_url: null
                meta:
                  duration: 0.021
                  endpoint: /api/v0/report
                  success: true
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or missing API key.
    get:
      tags:
      - Reports
      summary: Poll report status or list all reports
      description: 'Check the status of a report job by `report_id`. Pass `report_id=_all`

        to list every report generated with your key.


        When `status` is `DONE` the response includes `result_url` for

        downloading the CSV.

        '
      operationId: getReport
      parameters:
      - $ref: '#/components/parameters/ApiKey'
      - name: report_id
        in: query
        required: true
        description: Report ID from the POST response, or _all to list all.
        schema:
          type: string
        example: rpt_abc123
      responses:
        '200':
          description: Report status (and download URL when DONE).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                    - $ref: '#/components/schemas/ReportJob'
                    - type: array
                      items:
                        $ref: '#/components/schemas/ReportJob'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          description: Invalid or missing API key.
        '404':
          description: Report ID not found.
