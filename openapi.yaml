openapi: 3.0.3
info:
  title: Datalastic Maritime API
  version: '0'
  description: "REST API for real-time and historical maritime data — AIS vessel tracking,\nport information, static ship\
    \ specs, and a suite of add-on datasets (dry\ndock, ownership, casualties, inspections, sales & demolitions, engines,\n\
    classification societies).\n\n## Base paths\n\n| Group | Base path |\n|-------|-----------|\n| Core AIS & ports | `https://api.datalastic.com/api/v0`\
    \ |\n| Add-on datasets | `https://api.datalastic.com/api/maritime_reports` |\n| Reports (async jobs) | `https://api.datalastic.com/api/v0`\
    \ |\n\n## Authentication\nPass your API key as the `api-key` query parameter on every request.\nA single key works across\
    \ all plans and endpoints.\n\n## Credits\nEvery **successful** request deducts credits from your monthly allowance.\n\
    Failed requests (vessel not found, invalid identifier, etc.) are free.\n\n| Plan | Credits/month |\n|------|--------------|\n\
    | Starter | 20 000 |\n| Experimenter | 80 000 |\n| Developer Pro+ | Unlimited |\n\nRate limit: **600 requests / minute**\
    \ across all endpoints.\n\n## Async report pattern\nLarge datasets (full vessel list, historical location traffic, ownership\n\
    bulk export, etc.) are generated asynchronously:\n\n1. **POST** `/api/v0/report` with a JSON body containing `report_type`\
    \ (and\n   any filter params).\n2. Note the `report_id` in the response (`status: PENDING`).\n3. **GET** `/api/v0/report?api-key=…&report_id=…`\
    \ until `status: DONE`.\n4. Download the CSV from `result_url`.\n"
  contact:
    email: support@datalastic.com
    url: https://datalastic.com
  license:
    name: Commercial
    url: https://datalastic.com/terms-of-services/
servers:
- url: https://api.datalastic.com
  description: Production
components:
  securitySchemes:
    ApiKeyQuery:
      type: apiKey
      in: query
      name: api-key
      description: Your Datalastic API key. Obtain it from your account after subscribing to any plan.
  parameters:
    ApiKey:
      name: api-key
      in: query
      required: true
      description: Your Datalastic API key.
      schema:
        type: string
        example: YOUR_API_KEY
  schemas:
    Meta:
      type: object
      properties:
        duration:
          type: number
          format: float
          description: Server-side query time in seconds.
          example: 0.012
        endpoint:
          type: string
          example: /api/v0/vessel
        success:
          type: boolean
          example: true
    VesselLive:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: b8625b67-7142-cfd1-7b85-595cebfe4191
        name:
          type: string
          example: MAERSK CHENNAI
        mmsi:
          type: string
          example: '566093000'
        imo:
          type: string
          example: '9525338'
        eni:
          type: string
          nullable: true
          description: European Number of Identification (inland waterways).
        country_iso:
          type: string
          example: SG
        country_name:
          type: string
          example: Singapore
        type:
          type: string
          example: Cargo - Hazard A (Major)
        type_specific:
          type: string
          example: Container Ship
        lat:
          type: number
          format: float
          example: 6.303473
        lon:
          type: number
          format: float
          example: 3.201678
        speed:
          type: number
          format: float
          description: Speed over ground in knots.
          example: 14.2
        course:
          type: number
          format: float
          description: Course over ground in degrees (0-360).
          example: 326
        heading:
          type: number
          format: float
          description: True heading in degrees (0-360).
          example: 226
        navigational_status:
          type: string
          example: Under way using engine
        destination:
          type: string
          nullable: true
          example: ROTTERDAM
        last_position_epoch:
          type: integer
          example: 1624127400
        last_position_UTC:
          type: string
          format: date-time
          example: '2021-06-20T08:30:00Z'
        area:
          type: string
          nullable: true
          example: North Sea
    VesselLivePro:
      allOf:
      - $ref: '#/components/schemas/VesselLive'
      - type: object
        properties:
          eta_UTC:
            type: string
            format: date-time
            nullable: true
            example: '2021-06-25T08:00:00Z'
          eta_epoch:
            type: integer
            nullable: true
            example: 1624608000
